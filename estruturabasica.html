<!-- todo o codigo html deve esta em um arquivo com a extensao .html
um exemplo disso e esse proprio arquivo: estruturabasica.html -->
<!DOCTYPE html>
<!-- o comando acima informa para o navegador a versão do html em uso
nesse caso, a versão informada é o html5 -->
<html lang="pt-br">
<!--o comando acima e o inicio do html, inicio da tag html, tag de abertura html
tags sao os comandos dentro de <>
e dentro dessa tag que estara quase todo o codigo html
a tag esta com o atributo lang que esta recebendo o valor pt-br
com esse atributo e valor, o html e reconhecido na lingua portuguesa 
e possivel mudar o valor de pt-br para en por exemplo
assim a tag html seria reconhecido na lingua inglesa -->
<head>
<!-- a tag de abertura de head, e a tag de configuracao do html por assim dizer
nela não estara dados visiveis no site, apenas dados de configurações-->
    <meta charset="UTF-8">
<!--a tag meta com o atributo charset e valor utf-8
configurar o site para poder trabalhar com os caracteres latinos
preste atencao na identacao -->
    <title>Estrutura basica html</title>
<!--tag de abertura title no inicio e tag de fechamento title no final, com o conteudo Estrutura basica html
essa tag e o que define o nome da pagina na aba do navegador
nesse caso, o nome e Estrutura basica html
note que a tag abrir e fechar na mesma linha, algumas tags nao precisam de tag de fechamento como a tag meta -->
</head>
<!-- fechamento da tag head -->
<body>
<!-- abertura da tag body
 e aqui que estaram todos ou a maioria dos elementos que iram compor a parte visial do site-->
</body>
<!--tag de fechamento body-->
</html>
<!--tag de fechamento html-->
